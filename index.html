<script>
  // ----------------------
  // Задаём треки
  // ----------------------
  const tracks = [
    "https://docs.google.com/uc?export=download&id=1KaBhPrXowMt8LtD_3gkHd_bZL_s4L2UQ",
    "https://docs.google.com/uc?export=download&id=1XH9LCvcDCOk6zQSKOu9gk-IgkTb4A9NQ",
    "https://docs.google.com/uc?export=download&id=1y-uBkJNsxwfsgDSX64PHxWcytK5piwWO",
    "https://docs.google.com/uc?export=download&id=1HOlDVswtTGW4rLuxdXYKO07WLhdKOJ3H",
    "https://docs.google.com/uc?export=download&id=15oqBAH2Cy1zJeJ21tH9sph-KC0nxcRI6",
    "https://docs.google.com/uc?export=download&id=1homo_pkWE347uiZrglbaqU-TRMjqkMWd",
    "https://docs.google.com/uc?export=download&id=1Jq79vUR-1bIgU3ye7wcK1IxClgyG61RJ"
  ];

  // ----------------------
  // Тексты треков
  // ----------------------
  const lyricsData = [
    [
      {time:0,text:"Intro... (пустой)"},
      {time:5,text:"Track 1 Text line 1"},
      {time:10,text:"Track 1 Text line 2"}
    ],
    [
      {time:0,text:"Intro... (пустой)"},
      {time:5,text:"Track 2 line 1"},
      {time:10,text:"Track 2 line 2"}
    ],
    [
      {time:0,text:"It’s stronger than me, and I just can’t speak out,"},
      {time:6,text:"So I’m writing it down, clearing all of my doubt."},
      {time:12,text:"I’m putting it here, in this song, in this line,"}
    ],
    [
      {time:0,text:"The city sleeps, but our feelings bloom"},
      {time:6,text:"No need for words, under the moon"}
    ],
    [
      {time:0,text:"You know, you’re the best thing that’s happened to me"},
      {time:6,text:"You opened the door to a world I could never foresee"}
    ],
    [
      {time:0,text:"You’re sitting there, unaware of my steady gaze"},
      {time:6,text:"Among the crowd, you’re the one who lights the haze"}
    ],
    [
      {time:0,text:"This place has faded, lost all its light,"},
      {time:6,text:"We’re just embers, drifting in the night."}
    ]
  ];

  // ----------------------
  // Фоны треков
  // ----------------------
  const backgrounds = [
    "https://docs.google.com/uc?export=download&id=1wOP_x1FixSZEOtnZ6xJBynGZjk1LnuLB",
    "https://docs.google.com/uc?export=download&id=1wOP_x1FixSZEOtnZ6xJBynGZjk1LnuLB",
    "https://docs.google.com/uc?export=download&id=1wOP_x1FixSZEOtnZ6xJBynGZjk1LnuLB",
    "https://docs.google.com/uc?export=download&id=1wOP_x1FixSZEOtnZ6xJBynGZjk1LnuLB",
    "https://docs.google.com/uc?export=download&id=1wOP_x1FixSZEOtnZ6xJBynGZjk1LnuLB",
    "https://docs.google.com/uc?export=download&id=1wOP_x1FixSZEOtnZ6xJBynGZjk1LnuLB",
    "https://docs.google.com/uc?export=download&id=1wOP_x1FixSZEOtnZ6xJBynGZjk1LnuLB"
  ];

  // ----------------------
  // Инициализация плеера
  // ----------------------
  let currentTrack = 0;
  const player = document.getElementById("player");
  const lyricsDiv = document.getElementById("lyrics");

  function playTrack(index) {
    currentTrack = index;
    player.src = tracks[index];
    player.play();
    updateBackground();
  }

  player.addEventListener("ended", () => {
    playTrack((currentTrack + 1) % tracks.length);
  });

  // ----------------------
  // Обновление фона
  // ----------------------
  function updateBackground() {
    document.body.style.backgroundImage = `url(${backgrounds[currentTrack]})`;
  }

  // ----------------------
  // Подсветка текста
  // ----------------------
  function updateLyrics() {
    const time = player.currentTime;
    const lyrics = lyricsData[currentTrack];
    let currentText = "";
    for (let i=0; i<lyrics.length; i++){
      if(time >= lyrics[i].time){
        currentText = lyrics[i].text;
      } else {
        break;
      }
    }
    lyricsDiv.innerHTML = currentText;
    requestAnimationFrame(updateLyrics);
  }

  // ----------------------
  // Старт
  // ----------------------
  playTrack(0);
  updateLyrics();
</script>
